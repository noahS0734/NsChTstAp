<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Titan Finance OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s; }
        .dark { background-color: #0f172a; color: white; }
        .modal-bg { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card { background: white; border-radius: 1.5rem; transition: all 0.2s; }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        .active-tab { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .dark .active-tab { background-color: #3b82f6; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'titan_finance_v3';
        const EXCHANGE_RATES = { USD: 3.7, EUR: 4.0, GEL: 1.4, ILS: 1 };

        const Icons = {
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        };

        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchQuery, setSearchQuery] = useState('');
            const [dateFilter, setDateFilter] = useState('all'); // 'all' or 'month'
            
            // נתונים
            const [transactions, setTransactions] = useState([]);
            const [loans, setLoans] = useState([]);
            const [debts, setDebts] = useState([]);
            const [savings, setSavings] = useState([]);
            const [budgets, setBudgets] = useState({});
            const [categories, setCategories] = useState(['מזון', 'דלק', 'קניות', 'בילוי']);
            
            const [isModalOpen, setIsModalOpen] = useState(null);
            const [loading, setLoading] = useState(true);

            // טעינה ושמירה
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = JSON.parse(saved);
                    setTransactions(d.transactions || []);
                    setLoans(d.loans || []);
                    setDebts(d.debts || []);
                    setSavings(d.savings || []);
                    setBudgets(d.budgets || {});
                    setCategories(d.categories || ['מזון', 'דלק', 'קניות', 'בילוי']);
                    setDarkMode(d.darkMode || false);
                }
                setLoading(false);
            }, []);

            useEffect(() => {
                if (!loading) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions, loans, debts, savings, budgets, categories, darkMode }));
                    document.body.classList.toggle('dark', darkMode);
                }
            }, [transactions, loans, debts, savings, budgets, categories, darkMode, loading]);

            // חישובים
            const stats = useMemo(() => {
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();

                const filteredT = transactions.filter(t => {
                    if (dateFilter === 'all') return true;
                    const d = new Date(t.timestamp);
                    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
                });

                const ins = filteredT.filter(t => t.type === 'in').reduce((s, t) => s + t.amount, 0);
                const outs = filteredT.filter(t => t.type === 'out').reduce((s, t) => s + t.amount, 0);
                
                const catTotals = {};
                filteredT.filter(t => t.type === 'out').forEach(t => {
                    catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
                });

                const totalLoans = loans.filter(l => l.status !== 'paid').reduce((s, l) => s + (l.amount - (l.paidAmount || 0)), 0);
                const totalDebts = debts.filter(d => d.status !== 'paid').reduce((s, d) => s + (d.amount - (d.paidAmount || 0)), 0);

                return { cash: ins - outs, ins, outs, catTotals, totalLoans, totalDebts };
            }, [transactions, loans, debts, dateFilter]);

            const exportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(localStorage.getItem(STORAGE_KEY));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", `finance_backup_${new Date().toLocaleDateString()}.json`);
                downloadAnchorNode.click();
            };

            const handleAddTransaction = (data) => {
                const rate = EXCHANGE_RATES[data.currency || 'ILS'];
                const amountInIls = Number(data.amount) * rate;
                
                const newT = {
                    id: Date.now(),
                    amount: amountInIls,
                    origAmount: data.amount,
                    currency: data.currency || 'ILS',
                    description: data.desc,
                    category: data.category || 'כללי',
                    type: data.type,
                    timestamp: new Date().toISOString()
                };
                setTransactions(prev => [newT, ...prev]);
                if (data.category && !categories.includes(data.category)) setCategories(p => [...p, data.category]);
                setIsModalOpen(null);
            };

            if (loading) return null;

            return (
                <div className={`max-w-md mx-auto min-h-screen pb-24 relative ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                    {/* Header */}
                    <header className="bg-blue-600 p-6 pt-12 rounded-b-[2.5rem] shadow-xl sticky top-0 z-30 text-white">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-xl font-black tracking-tight">TITAN FINANCE</h1>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 bg-white/10 rounded-full">
                                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                            </button>
                        </div>
                        <div className="bg-white/10 backdrop-blur-md rounded-3xl p-6 border border-white/20">
                            <p className="text-blue-100 text-[10px] font-bold uppercase mb-1">יתרה נוכחית (ש"ח)</p>
                            <h2 className="text-4xl font-black">₪{stats.cash.toLocaleString()}</h2>
                        </div>
                    </header>

                    {/* Quick Buttons */}
                    <div className="px-4 -mt-6 flex gap-2 overflow-x-auto no-scrollbar relative z-40 pb-4">
                        <button onClick={() => setIsModalOpen('expense')} className="flex-shrink-0 bg-red-500 text-white px-6 py-4 rounded-2xl font-bold shadow-lg hover:scale-95 transition">הוצאה</button>
                        <button onClick={() => setIsModalOpen('income')} className="flex-shrink-0 bg-green-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg hover:scale-95 transition">הכנסה</button>
                        <button onClick={() => setIsModalOpen('loan')} className="flex-shrink-0 bg-blue-500 text-white px-6 py-4 rounded-2xl font-bold shadow-lg hover:scale-95 transition">הלוואה/חוב</button>
                    </div>

                    {/* Stats Summary Card */}
                    <div className="px-4 grid grid-cols-2 gap-3 mb-6">
                        <div className="card p-4 shadow-sm border-r-4 border-blue-400">
                            <p className="text-[10px] text-gray-400 font-bold uppercase">חייבים לך</p>
                            <p className="text-lg font-black text-blue-500">₪{stats.totalLoans.toLocaleString()}</p>
                        </div>
                        <div className="card p-4 shadow-sm border-r-4 border-purple-400">
                            <p className="text-[10px] text-gray-400 font-bold uppercase">חובות שלך</p>
                            <p className="text-lg font-black text-purple-500">₪{stats.totalDebts.toLocaleString()}</p>
                        </div>
                    </div>

                    {/* Tabs */}
                    <nav className="px-4 mb-4">
                        <div className="flex bg-gray-200 dark:bg-slate-800 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                            {[
                                {id: 'dashboard', n: 'תנועות'},
                                {id: 'debts', n: 'חובות'},
                                {id: 'savings', n: 'חיסכון'},
                                {id: 'stats', n: 'סיכום'}
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 py-2 px-3 text-[11px] font-bold rounded-xl whitespace-nowrap transition-all ${activeTab === t.id ? 'active-tab' : 'text-gray-500'}`}>
                                    {t.n}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="px-4 space-y-4">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-3">
                                <div className="relative">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></span>
                                    <input 
                                        type="text" 
                                        placeholder="חיפוש תנועה..." 
                                        className="w-full p-3 pl-10 card outline-none text-sm font-bold"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                                {transactions.filter(t => t.description.includes(searchQuery)).map(t => (
                                    <div key={t.id} className="card p-4 flex justify-between items-center animate-pop shadow-sm">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-2 h-8 rounded-full ${t.type === 'in' ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                            <div>
                                                <p className="font-bold text-sm leading-tight">{t.description}</p>
                                                <p className="text-[10px] text-gray-400 font-bold uppercase">{t.category} • {new Date(t.timestamp).toLocaleDateString('he-IL')}</p>
                                            </div>
                                        </div>
                                        <div className="text-left">
                                            <p className={`font-black ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>
                                                {t.type === 'in' ? '+' : '-'}₪{t.amount.toLocaleString()}
                                            </p>
                                            {t.currency !== 'ILS' && <p className="text-[9px] text-gray-400 font-bold">{t.origAmount} {t.currency}</p>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'debts' && (
                            <div className="space-y-4">
                                <h3 className="font-black text-xs uppercase tracking-widest text-gray-400 px-1">ניהול התחייבויות</h3>
                                {[...loans, ...debts].filter(i => i.status !== 'paid').map(item => {
                                    const isExpired = new Date(item.dueDate) < new Date();
                                    return (
                                        <div key={item.id} className={`card p-5 border-l-4 ${isExpired ? 'border-red-600 animate-pulse' : 'border-blue-500'} shadow-md`}>
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <p className="font-black text-lg">{item.name}</p>
                                                    <p className={`text-[10px] font-bold uppercase ${isExpired ? 'text-red-600' : 'text-gray-400'}`}>
                                                        {isExpired ? 'עבר תאריך היעד!' : `יעד: ${item.dueDate}`}
                                                    </p>
                                                </div>
                                                <div className="text-left">
                                                    <p className="font-black text-xl">₪{(item.amount - (item.paidAmount || 0)).toLocaleString()}</p>
                                                    <p className="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">יתרה לתשלום</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button className="flex-1 py-2 bg-blue-600 text-white rounded-xl text-xs font-black shadow-lg">תשלום חלקי</button>
                                                <button className="flex-1 py-2 bg-gray-100 dark:bg-slate-700 text-gray-500 rounded-xl text-xs font-black">סגירה</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'savings' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center px-1">
                                    <h3 className="font-black text-xs uppercase text-gray-400">יעדי חיסכון</h3>
                                    <button onClick={() => setIsModalOpen('saving')} className="text-blue-500 font-black text-xs">+ יעד חדש</button>
                                </div>
                                {savings.map(s => {
                                    const progress = Math.min((s.current / s.target) * 100, 100);
                                    return (
                                        <div key={s.id} className="card p-5 shadow-sm">
                                            <div className="flex justify-between items-center mb-2">
                                                <p className="font-black">{s.name}</p>
                                                <p className="text-xs font-black text-blue-500">₪{s.current.toLocaleString()} / ₪{s.target.toLocaleString()}</p>
                                            </div>
                                            <div className="w-full bg-gray-100 dark:bg-slate-700 h-3 rounded-full overflow-hidden mb-4">
                                                <div className="bg-blue-500 h-full rounded-full transition-all" style={{width: `${progress}%`}}></div>
                                            </div>
                                            <button className="w-full py-2 bg-green-50 text-green-600 rounded-xl text-[10px] font-black uppercase">הוסף הפקדה</button>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="space-y-4 animate-pop">
                                <div className="flex gap-2 p-1 bg-gray-100 dark:bg-slate-800 rounded-xl">
                                    <button onClick={() => setDateFilter('month')} className={`flex-1 py-1.5 text-[10px] font-black rounded-lg ${dateFilter === 'month' ? 'bg-white dark:bg-slate-700 shadow-sm' : 'text-gray-400'}`}>החודש</button>
                                    <button onClick={() => setDateFilter('all')} className={`flex-1 py-1.5 text-[10px] font-black rounded-lg ${dateFilter === 'all' ? 'bg-white dark:bg-slate-700 shadow-sm' : 'text-gray-400'}`}>כל הזמן</button>
                                </div>

                                <div className="card p-6 shadow-sm">
                                    <h3 className="font-black mb-6 flex justify-between items-center">
                                        התפלגות והוצאות
                                        <span className="text-[10px] text-blue-500">₪{stats.outs.toLocaleString()} סה"כ</span>
                                    </h3>
                                    <div className="space-y-5">
                                        {Object.entries(stats.catTotals).map(([name, val]) => {
                                            const budget = budgets[name] || 0;
                                            const progress = (val / stats.outs) * 100;
                                            const budgetProgress = budget ? (val / budget) * 100 : 0;
                                            
                                            return (
                                                <div key={name}>
                                                    <div className="flex justify-between text-[11px] font-black mb-1">
                                                        <span>{name}</span>
                                                        <span className={budget && val > budget ? 'text-red-500' : 'text-gray-400'}>
                                                            ₪{val.toLocaleString()} {budget ? `/ ₪${budget}` : ''}
                                                        </span>
                                                    </div>
                                                    <div className="w-full bg-gray-100 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
                                                        <div className={`h-full rounded-full ${budget && val > budget ? 'bg-red-500' : 'bg-blue-500'}`} style={{width: `${budget ? Math.min(budgetProgress, 100) : progress}%`}}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <button onClick={exportData} className="w-full mt-8 py-3 bg-gray-900 text-white rounded-2xl text-xs font-black uppercase tracking-widest flex items-center justify-center gap-2">
                                        גיבוי נתונים לקובץ
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
                            <div className="absolute inset-0 modal-bg" onClick={() => setIsModalOpen(null)}></div>
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-t-[2.5rem] p-8 shadow-2xl relative z-[110] animate-pop">
                                <h3 className="font-black text-2xl mb-6">רישום חדש</h3>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handleAddTransaction({
                                        amount: fd.get('amount'),
                                        desc: fd.get('desc'),
                                        type: isModalOpen === 'expense' ? 'out' : 'in',
                                        category: selectedCategory,
                                        currency: fd.get('currency')
                                    });
                                }} className="space-y-4">
                                    <div className="flex gap-2">
                                        <input name="amount" type="number" placeholder="סכום" required className="flex-[2] p-4 bg-gray-100 dark:bg-slate-800 rounded-2xl font-black text-xl outline-none" />
                                        <select name="currency" className="flex-1 bg-gray-100 dark:bg-slate-800 rounded-2xl font-bold p-2 outline-none">
                                            <option value="ILS">₪ שקל</option>
                                            <option value="USD">$ דולר</option>
                                            <option value="EUR">€ אירו</option>
                                            <option value="GEL">₾ לארי</option>
                                        </select>
                                    </div>
                                    <input name="desc" placeholder="תיאור" required className="w-full p-4 bg-gray-100 dark:bg-slate-800 rounded-2xl font-bold outline-none" />
                                    
                                    <div className="flex flex-wrap gap-2 py-2">
                                        {categories.map(c => (
                                            <button key={c} type="button" onClick={() => setSelectedCategory(c)} className={`px-4 py-2 rounded-xl text-[10px] font-black border-2 transition-all ${selectedCategory === c ? 'bg-blue-600 border-blue-600 text-white' : 'border-gray-100 dark:border-slate-700 text-gray-400'}`}>{c}</button>
                                        ))}
                                    </div>
                                    
                                    <button type="submit" className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl">שמור תנועה</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
