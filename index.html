<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Titan Finance OS - Power User</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; transition: all 0.3s; }
        .dark { background-color: #0f172a; color: white; }
        .modal-bg { background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); }
        .card { background: white; border-radius: 2rem; box-shadow: 0 4px 25px -5px rgba(0,0,0,0.1); }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        .active-tab { background-color: #2563eb; color: white; transform: scale(1.02); }
        .animate-pop { animation: pop 0.25s ease-out; }
        @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .urgent-pulse { border: 2px solid #ef4444; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'titan_finance_power_v1';
        const EXCHANGE_RATES = { ILS: 1, USD: 3.7, EUR: 4.0, GEL: 1.4 };

        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchQuery, setSearchQuery] = useState('');
            
            const [transactions, setTransactions] = useState([]);
            const [loans, setLoans] = useState([]); 
            const [debts, setDebts] = useState([]); 
            const [categories, setCategories] = useState(['מזון', 'דלק', 'קניות', 'בילוי', 'בריאות']);
            
            const [isModalOpen, setIsModalOpen] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState('');
            const [partialData, setPartialData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = JSON.parse(saved);
                    setTransactions(d.transactions || []);
                    setLoans(d.loans || []);
                    setDebts(d.debts || []);
                    setCategories(d.categories || ['מזון', 'דלק', 'קניות', 'בילוי', 'בריאות']);
                    setDarkMode(d.darkMode || false);
                }
                setLoading(false);
            }, []);

            useEffect(() => {
                if (!loading) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions, loans, debts, categories, darkMode }));
                    document.body.classList.toggle('dark', darkMode);
                }
            }, [transactions, loans, debts, categories, darkMode, loading]);

            const stats = useMemo(() => {
                const ins = transactions.filter(t => t.type === 'in').reduce((s, t) => s + t.amount, 0);
                const outs = transactions.filter(t => t.type === 'out').reduce((s, t) => s + t.amount, 0);
                const lSum = loans.filter(l => l.status !== 'paid').reduce((s, l) => s + (l.amount - (l.paidAmount || 0)), 0);
                const dSum = debts.filter(d => d.status !== 'paid').reduce((s, d) => s + (d.amount - (d.paidAmount || 0)), 0);
                
                // מציאת חוב הכי דחוף
                const allOpen = [...loans.map(l=>({...l, type:'loan'})), ...debts.map(d=>({...d, type:'debt'}))].filter(i=>i.status!=='paid');
                const urgent = allOpen.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate))[0];

                return { balance: ins - outs, lSum, dSum, urgent };
            }, [transactions, loans, debts]);

            const handleSaveTransaction = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const amount = Number(fd.get('amount'));
                const rate = EXCHANGE_RATES[fd.get('currency')] || 1;
                const totalAmount = amount * rate;
                
                if (isModalOpen === 'loan') {
                    const isIncomingDebt = fd.get('isDebt') === 'on';
                    const loanObj = {
                        id: Date.now(),
                        name: fd.get('desc'),
                        amount: totalAmount,
                        paidAmount: 0,
                        dueDate: fd.get('due'),
                        status: 'open',
                        priority: fd.get('priority') === 'on'
                    };
                    if (isIncomingDebt) setDebts(p => [loanObj, ...p]);
                    else setLoans(p => [loanObj, ...p]);
                } else {
                    setTransactions(p => [{
                        id: Date.now(),
                        amount: totalAmount,
                        description: fd.get('desc'),
                        category: selectedCategory || fd.get('custom_cat') || 'כללי',
                        type: isModalOpen === 'income' ? 'in' : 'out',
                        timestamp: new Date().toISOString()
                    }, ...p]);
                }
                setIsModalOpen(null);
                setSelectedCategory('');
            };

            const handlePartial = (e) => {
                e.preventDefault();
                const amount = Number(new FormData(e.target).get('pAmount'));
                const { item, type } = partialData;
                const updateFn = (list) => list.map(i => {
                    if (i.id === item.id) {
                        const newPaid = (i.paidAmount || 0) + amount;
                        return { ...i, paidAmount: newPaid, status: newPaid >= i.amount ? 'paid' : 'open' };
                    }
                    return i;
                });
                if (type === 'loan') setLoans(updateFn); else setDebts(updateFn);
                setTransactions(p => [{ id: Date.now(), amount, description: `החזר: ${item.name}`, category: 'חובות', type: type === 'loan' ? 'in' : 'out', timestamp: new Date().toISOString() }, ...p]);
                setPartialData(null);
                setIsModalOpen(null);
            };

            if (loading) return null;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-28 relative">
                    <header className="bg-blue-600 p-8 pt-12 rounded-b-[3rem] shadow-2xl sticky top-0 z-30 text-white text-right">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-2xl font-black italic tracking-tighter">TITAN OS</h1>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-3 bg-white/10 rounded-2xl">{darkMode ? '☀️' : '🌙'}</button>
                        </div>
                        <div className="bg-white/10 backdrop-blur-xl rounded-[2rem] p-6 border border-white/20">
                            <div className="flex justify-between items-center">
                                <div className="text-right">
                                    <p className="text-blue-100 text-[10px] font-black uppercase tracking-widest">יתרה כוללת</p>
                                    <h2 className="text-4xl font-black">₪{stats.balance.toLocaleString()}</h2>
                                </div>
                                {stats.urgent && (
                                    <div className="bg-red-500/20 p-2 rounded-xl border border-red-400/30 text-[9px] font-bold text-center">
                                        <p className="text-red-200">הבא בתור ⏳</p>
                                        <p>{stats.urgent.name}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <div className="px-6 -mt-8 flex gap-3 overflow-x-auto no-scrollbar relative z-40 pb-6">
                        <button onClick={() => setIsModalOpen('expense')} className="flex-shrink-0 bg-red-500 text-white px-8 py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition">הוצאה</button>
                        <button onClick={() => setIsModalOpen('income')} className="flex-shrink-0 bg-green-500 text-white px-8 py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition">הכנסה</button>
                        <button onClick={() => setIsModalOpen('loan')} className="flex-shrink-0 bg-blue-500 text-white px-8 py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition">חוב חדש</button>
                    </div>

                    <nav className="px-6 mb-6">
                        <div className="flex bg-gray-200 dark:bg-slate-800 p-1.5 rounded-[1.5rem]">
                            {['dashboard', 'debts', 'stats'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 text-xs font-black rounded-2xl transition-all ${activeTab === t ? 'active-tab' : 'text-gray-500'}`}>
                                    {t === 'dashboard' ? 'תנועות' : t === 'debts' ? 'חובות והלוואות' : 'סיכום'}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="px-6 space-y-4 text-right">
                        {activeTab === 'dashboard' && (
                            <>
                                <input type="text" placeholder="חיפוש..." className="w-full p-4 card outline-none text-sm font-bold dark:text-gray-900" onChange={e => setSearchQuery(e.target.value)} />
                                {transactions.filter(t => t.description.includes(searchQuery)).map(t => (
                                    <div key={t.id} className="card p-5 flex justify-between items-center animate-pop">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-1.5 h-8 rounded-full ${t.type === 'in' ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                            <div className="text-right">
                                                <p className="font-black text-sm">{t.description}</p>
                                                <p className="text-[10px] text-gray-400 font-bold">{t.category} • {new Date(t.timestamp).toLocaleDateString('he-IL')}</p>
                                            </div>
                                        </div>
                                        <p className={`font-black ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>₪{t.amount.toLocaleString()}</p>
                                    </div>
                                ))}
                            </>
                        )}

                        {activeTab === 'debts' && (
                            <div className="space-y-8">
                                {/* חייבים לי - מסודר לפי תאריך יעד */}
                                <div>
                                    <div className="flex justify-between items-center mb-3 mr-2">
                                        <h3 className="font-black text-green-600 text-lg">💰 חייבים לי (₪{stats.lSum.toLocaleString()})</h3>
                                    </div>
                                    <div className="space-y-4">
                                        {loans.filter(i => i.status !== 'paid').sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)).map(item => (
                                            <div key={item.id} className={`card p-6 border-r-8 border-green-500 shadow-lg animate-pop ${item.priority ? 'urgent-pulse' : ''}`}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <p className="font-black text-lg">{item.name}</p>
                                                            {item.priority && <span className="bg-red-100 text-red-600 text-[8px] px-2 py-0.5 rounded-full font-black">דחוף!</span>}
                                                        </div>
                                                        <p className={`text-xs font-bold ${new Date(item.dueDate) < new Date() ? 'text-red-500' : 'text-gray-400'}`}>יעד החזר: {item.dueDate}</p>
                                                    </div>
                                                    <p className="font-black text-xl text-green-600">₪{(item.amount - (item.paidAmount || 0)).toLocaleString()}</p>
                                                </div>
                                                <button onClick={() => {setPartialData({item, type: 'loan'}); setIsModalOpen('partial');}} className="w-full py-3 bg-green-50 text-green-600 rounded-xl font-black text-xs">עדכון החזר</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* חובות שלי - מסודר לפי תאריך יעד */}
                                <div>
                                    <h3 className="font-black text-red-600 mb-3 mr-2 text-lg">💳 חובות שלי (₪{stats.dSum.toLocaleString()})</h3>
                                    <div className="space-y-4">
                                        {debts.filter(i => i.status !== 'paid').sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)).map(item => (
                                            <div key={item.id} className={`card p-6 border-r-8 border-red-500 shadow-lg animate-pop ${item.priority ? 'urgent-pulse' : ''}`}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <p className="font-black text-lg">{item.name}</p>
                                                            {item.priority && <span className="bg-red-100 text-red-600 text-[8px] px-2 py-0.5 rounded-full font-black">דחוף!</span>}
                                                        </div>
                                                        <p className={`text-xs font-bold ${new Date(item.dueDate) < new Date() ? 'text-red-500' : 'text-gray-400'}`}>יעד תשלום: {item.dueDate}</p>
                                                    </div>
                                                    <p className="font-black text-xl text-red-600">₪{(item.amount - (item.paidAmount || 0)).toLocaleString()}</p>
                                                </div>
                                                <button onClick={() => {setPartialData({item, type: 'debt'}); setIsModalOpen('partial');}} className="w-full py-3 bg-red-50 text-red-600 rounded-xl font-black text-xs">ביצוע תשלום</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="card p-8">
                                <h3 className="font-black text-xl mb-6">סיכום התפלגות</h3>
                                <p className="text-center text-gray-400 italic">הנתונים יופיעו ככל שתוסיף תנועות...</p>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
                            <div className="absolute inset-0 modal-bg" onClick={() => setIsModalOpen(null)}></div>
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[3rem] p-10 shadow-2xl relative z-[110] animate-pop text-right">
                                {isModalOpen === 'partial' ? (
                                    <form onSubmit={handlePartial} className="space-y-6">
                                        <h3 className="font-black text-2xl text-center">החזר ל{partialData.item.name}</h3>
                                        <input name="pAmount" type="number" inputMode="decimal" placeholder="סכום" required className="w-full p-6 bg-gray-100 rounded-3xl font-black text-center text-3xl dark:text-gray-900" />
                                        <button type="submit" className="w-full py-6 bg-green-600 text-white rounded-[2rem] font-black">אישור</button>
                                    </form>
                                ) : (
                                    <form onSubmit={handleSaveTransaction} className="space-y-5">
                                        <h3 className="font-black text-2xl">{isModalOpen === 'expense' ? '💸 הוצאה' : isModalOpen === 'income' ? '💰 הכנסה' : '🤝 חוב / הלוואה'}</h3>
                                        <div className="flex gap-3">
                                            <input name="amount" type="number" inputMode="decimal" placeholder="סכום" required className="flex-[2] p-5 bg-gray-100 rounded-3xl font-black text-2xl dark:text-gray-900" />
                                            <select name="currency" className="flex-1 bg-gray-100 rounded-3xl font-bold p-2 dark:text-gray-900">
                                                <option value="ILS">₪</option><option value="USD">$</option>
                                            </select>
                                        </div>
                                        <input name="desc" placeholder="תיאור" required className="w-full p-5 bg-gray-100 rounded-3xl font-bold dark:text-gray-900" />
                                        
                                        {isModalOpen === 'loan' && (
                                            <div className="p-6 bg-blue-50 dark:bg-slate-800 rounded-3xl space-y-4">
                                                <label className="flex items-center gap-3 cursor-pointer">
                                                    <input name="isDebt" type="checkbox" className="w-6 h-6" />
                                                    <span className="text-sm font-black text-blue-800 dark:text-blue-300">זה חוב שלי</span>
                                                </label>
                                                <label className="flex items-center gap-3 cursor-pointer">
                                                    <input name="priority" type="checkbox" className="w-6 h-6" />
                                                    <span className="text-sm font-black text-red-600">חוב דחוף / עדיפות גבוהה</span>
                                                </label>
                                                <input name="due" type="date" required className="w-full p-3 bg-white rounded-2xl font-bold dark:text-gray-900" />
                                            </div>
                                        )}
                                        <button type="submit" className="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-xl mt-4">שמור</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
