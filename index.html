<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Titan Finance OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s; }
        .dark { background-color: #0f172a; color: white; }
        .modal-bg { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        .card { background: white; border-radius: 1.5rem; }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        .active-tab { background-color: #2563eb; color: white; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'titan_finance_final_v1';
        const EXCHANGE_RATES = { USD: 3.7, EUR: 4.0, GEL: 1.4, ILS: 1 };

        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchQuery, setSearchQuery] = useState('');
            const [dateFilter, setDateFilter] = useState('all');
            
            const [transactions, setTransactions] = useState([]);
            const [loans, setLoans] = useState([]);
            const [debts, setDebts] = useState([]);
            const [savings, setSavings] = useState([]);
            const [categories, setCategories] = useState(['מזון', 'דלק', 'קניות', 'בילוי', 'בריאות']);
            
            const [isModalOpen, setIsModalOpen] = useState(null); // 'expense', 'income', 'loan', 'partial'
            const [selectedCategory, setSelectedCategory] = useState('');
            const [partialData, setPartialData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = JSON.parse(saved);
                    setTransactions(d.transactions || []);
                    setLoans(d.loans || []);
                    setDebts(d.debts || []);
                    setSavings(d.savings || []);
                    setCategories(d.categories || ['מזון', 'דלק', 'קניות', 'בילוי', 'בריאות']);
                    setDarkMode(d.darkMode || false);
                }
                setLoading(false);
            }, []);

            useEffect(() => {
                if (!loading) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions, loans, debts, savings, categories, darkMode }));
                    document.body.classList.toggle('dark', darkMode);
                }
            }, [transactions, loans, debts, savings, categories, darkMode, loading]);

            const stats = useMemo(() => {
                const now = new Date();
                const filtered = transactions.filter(t => {
                    if (dateFilter === 'all') return true;
                    const d = new Date(t.timestamp);
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                });

                const ins = filtered.filter(t => t.type === 'in').reduce((s, t) => s + t.amount, 0);
                const outs = filtered.filter(t => t.type === 'out').reduce((s, t) => s + t.amount, 0);
                const catTotals = {};
                filtered.filter(t => t.type === 'out').forEach(t => {
                    catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
                });

                const lSum = loans.filter(l => l.status !== 'paid').reduce((s, l) => s + (l.amount - (l.paidAmount || 0)), 0);
                const dSum = debts.filter(d => d.status !== 'paid').reduce((s, d) => s + (d.amount - (d.paidAmount || 0)), 0);

                return { cash: ins - outs, ins, outs, catTotals, lSum, dSum };
            }, [transactions, loans, debts, dateFilter]);

            const handleSaveTransaction = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const amount = Number(fd.get('amount'));
                const currency = fd.get('currency');
                const rate = EXCHANGE_RATES[currency] || 1;
                const totalAmount = amount * rate;

                const newT = {
                    id: Date.now(),
                    amount: totalAmount,
                    description: fd.get('desc'),
                    category: selectedCategory || 'כללי',
                    type: isModalOpen === 'income' ? 'in' : 'out',
                    timestamp: new Date().toISOString()
                };

                if (isModalOpen === 'loan') {
                    const isIncomingDebt = fd.get('isDebt') === 'on';
                    const loanObj = {
                        id: Date.now(),
                        name: fd.get('desc'),
                        amount: totalAmount,
                        paidAmount: 0,
                        dueDate: fd.get('due'),
                        status: 'open'
                    };
                    if (isIncomingDebt) setDebts(p => [loanObj, ...p]);
                    else setLoans(p => [loanObj, ...p]);
                }

                setTransactions(p => [newT, ...p]);
                setIsModalOpen(null);
                setSelectedCategory('');
            };

            const handlePartial = (e) => {
                e.preventDefault();
                const amount = Number(new FormData(e.target).get('pAmount'));
                const { item, type } = partialData;

                const updateFn = (list) => list.map(i => {
                    if (i.id === item.id) {
                        const newPaid = (i.paidAmount || 0) + amount;
                        return { ...i, paidAmount: newPaid, status: newPaid >= i.amount ? 'paid' : 'open' };
                    }
                    return i;
                });

                if (type === 'loan') setLoans(updateFn);
                else setDebts(updateFn);

                setTransactions(p => [{
                    id: Date.now(),
                    amount: amount,
                    description: `החזר חלקי: ${item.name}`,
                    category: 'חובות',
                    type: type === 'loan' ? 'in' : 'out',
                    timestamp: new Date().toISOString()
                }, ...p]);

                setPartialData(null);
                setIsModalOpen(null);
            };

            if (loading) return null;

            return (
                <div className={`max-w-md mx-auto min-h-screen pb-24 relative overflow-x-hidden`}>
                    <header className="bg-blue-600 p-6 pt-12 rounded-b-[2.5rem] shadow-xl sticky top-0 z-30 text-white text-right">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-xl font-black">TITAN FINANCE</h1>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 bg-white/10 rounded-full">
                                {darkMode ? '☀️' : '🌙'}
                            </button>
                        </div>
                        <div className="bg-white/10 backdrop-blur-md rounded-3xl p-6 border border-white/20">
                            <p className="text-blue-100 text-[10px] font-bold uppercase mb-1">יתרת מזומן</p>
                            <h2 className="text-4xl font-black">₪{stats.cash.toLocaleString()}</h2>
                        </div>
                    </header>

                    {/* כפתורי פעולה - כאן התיקון */}
                    <div className="px-4 -mt-6 flex gap-2 overflow-x-auto no-scrollbar relative z-40 pb-4">
                        <button onClick={() => setIsModalOpen('expense')} className="flex-shrink-0 bg-red-500 text-white px-6 py-4 rounded-2xl font-bold shadow-lg active:scale-90 transition">הוצאה</button>
                        <button onClick={() => setIsModalOpen('income')} className="flex-shrink-0 bg-green-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg active:scale-90 transition">הכנסה</button>
                        <button onClick={() => setIsModalOpen('loan')} className="flex-shrink-0 bg-blue-500 text-white px-6 py-4 rounded-2xl font-bold shadow-lg active:scale-90 transition">חוב/הלוואה</button>
                    </div>

                    <div className="px-4 grid grid-cols-2 gap-3 mb-6">
                        <div className="card p-4 shadow-sm border-r-4 border-blue-400">
                            <p className="text-[10px] text-gray-400 font-bold uppercase">חייבים לך</p>
                            <p className="text-lg font-black text-blue-500">₪{stats.lSum.toLocaleString()}</p>
                        </div>
                        <div className="card p-4 shadow-sm border-r-4 border-purple-400">
                            <p className="text-[10px] text-gray-400 font-bold uppercase">חובות שלך</p>
                            <p className="text-lg font-black text-purple-500">₪{stats.dSum.toLocaleString()}</p>
                        </div>
                    </div>

                    <nav className="px-4 mb-4">
                        <div className="flex bg-gray-200 dark:bg-slate-800 p-1 rounded-2xl">
                            {['dashboard', 'debts', 'stats'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-2 text-xs font-bold rounded-xl ${activeTab === t ? 'active-tab' : 'text-gray-500'}`}>
                                    {t === 'dashboard' ? 'תנועות' : t === 'debts' ? 'חובות' : 'סיכום'}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="px-4 space-y-3">
                        {activeTab === 'dashboard' && (
                            <>
                                <input type="text" placeholder="חיפוש..." className="w-full p-3 card outline-none text-sm font-bold mb-2" onChange={e => setSearchQuery(e.target.value)} />
                                {transactions.filter(t => t.description.includes(searchQuery)).map(t => (
                                    <div key={t.id} className="card p-4 flex justify-between items-center animate-pop">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-1.5 h-6 rounded-full ${t.type === 'in' ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                            <div>
                                                <p className="font-bold text-sm">{t.description}</p>
                                                <p className="text-[9px] text-gray-400 font-bold">{t.category} • {new Date(t.timestamp).toLocaleDateString('he-IL')}</p>
                                            </div>
                                        </div>
                                        <p className={`font-black ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>₪{t.amount.toLocaleString()}</p>
                                    </div>
                                ))}
                            </>
                        )}

                        {activeTab === 'debts' && (
                            <div className="space-y-3">
                                {[...loans.map(l => ({...l, type: 'loan'})), ...debts.map(d => ({...d, type: 'debt'}))].filter(i => i.status !== 'paid').map(item => (
                                    <div key={item.id} className="card p-5 border-r-4 border-blue-500 shadow-md">
                                        <div className="flex justify-between items-center mb-4">
                                            <div>
                                                <p className="font-black text-gray-800 dark:text-white">{item.name}</p>
                                                <p className="text-[10px] text-red-500 font-bold">יעד: {item.dueDate}</p>
                                            </div>
                                            <p className="font-black text-xl text-blue-600">₪{(item.amount - (item.paidAmount || 0)).toLocaleString()}</p>
                                        </div>
                                        <button onClick={() => {setPartialData({item, type: item.type}); setIsModalOpen('partial');}} className="w-full py-2 bg-blue-50 dark:bg-slate-700 text-blue-600 dark:text-blue-300 rounded-xl font-black text-xs">ביצוע החזר</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="card p-6">
                                <h3 className="font-black mb-4">התפלגות הוצאות</h3>
                                {Object.entries(stats.catTotals).map(([name, val]) => (
                                    <div key={name} className="mb-4">
                                        <div className="flex justify-between text-xs font-bold mb-1"><span>{name}</span><span>₪{val.toLocaleString()}</span></div>
                                        <div className="w-full bg-gray-100 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
                                            <div className="bg-blue-500 h-full" style={{width: `${(val/stats.outs)*100}%`}}></div>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => {
                                    const blob = new Blob([JSON.stringify(localStorage.getItem(STORAGE_KEY))], {type: 'application/json'});
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement('a'); a.href = url; a.download = 'backup.json'; a.click();
                                }} className="w-full mt-6 py-3 bg-gray-900 text-white rounded-2xl text-xs font-black">ייצוא גיבוי</button>
                            </div>
                        )}
                    </main>

                    {/* מודאלים */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
                            <div className="absolute inset-0 modal-bg" onClick={() => setIsModalOpen(null)}></div>
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-t-[2.5rem] p-8 shadow-2xl relative z-[110] animate-pop text-right">
                                {isModalOpen === 'partial' ? (
                                    <form onSubmit={handlePartial} className="space-y-4">
                                        <h3 className="font-black text-xl mb-4 text-center">תשלום חלקי ל{partialData?.item.name}</h3>
                                        <input name="pAmount" type="number" placeholder="סכום לתשלום" required className="w-full p-4 bg-gray-100 dark:bg-slate-800 rounded-2xl font-black text-center text-2xl" />
                                        <button type="submit" className="w-full py-5 bg-green-600 text-white rounded-2xl font-black">אשר תשלום</button>
                                    </form>
                                ) : (
                                    <form onSubmit={handleSaveTransaction} className="space-y-4">
                                        <h3 className="font-black text-2xl mb-6">
                                            {isModalOpen === 'expense' ? 'רישום הוצאה' : isModalOpen === 'income' ? 'רישום הכנסה' : 'הלוואה/חוב'}
                                        </h3>
                                        <div className="flex gap-2">
                                            <input name="amount" type="number" placeholder="סכום" required className="flex-[2] p-4 bg-gray-100 dark:bg-slate-800 rounded-2xl font-black text-xl outline-none" />
                                            <select name="currency" className="flex-1 bg-gray-100 dark:bg-slate-800 rounded-2xl font-bold p-2 outline-none">
                                                <option value="ILS">₪</option><option value="USD">$</option><option value="GEL">₾</option>
                                            </select>
                                        </div>
                                        <input name="desc" placeholder="תיאור" required className="w-full p-4 bg-gray-100 dark:bg-slate-800 rounded-2xl font-bold outline-none" />
                                        
                                        <div className="flex flex-wrap gap-2">
                                            {categories.map(c => (
                                                <button key={c} type="button" onClick={() => setSelectedCategory(c)} className={`px-3 py-2 rounded-xl text-[10px] font-black border-2 ${selectedCategory === c ? 'bg-blue-600 border-blue-600 text-white' : 'text-gray-400'}`}>{c}</button>
                                            ))}
                                        </div>

                                        {isModalOpen === 'loan' && (
                                            <div className="space-y-3">
                                                <label className="flex items-center gap-2 p-3 bg-gray-50 dark:bg-slate-800 rounded-xl cursor-pointer">
                                                    <input name="isDebt" type="checkbox" className="w-4 h-4" />
                                                    <span className="text-xs font-bold uppercase">זה חוב שלי למישהו</span>
                                                </label>
                                                <input name="due" type="date" required className="w-full p-4 bg-gray-100 dark:bg-slate-800 rounded-2xl font-bold outline-none" />
                                            </div>
                                        )}
                                        
                                        <button type="submit" className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl">שמור</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
