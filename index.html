<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Titan Finance OS - Ultimate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; transition: all 0.3s; }
        .dark { background-color: #0f172a; color: white; }
        .modal-bg { background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); }
        .card { background: white; border-radius: 2rem; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        .active-tab { background-color: #2563eb; color: white; transform: scale(1.05); }
        .animate-pop { animation: pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'titan_finance_v5_final';
        const EXCHANGE_RATES = { ILS: 1, USD: 3.7, EUR: 4.0, GEL: 1.4 };

        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchQuery, setSearchQuery] = useState('');
            const [dateFilter, setDateFilter] = useState('month');
            
            const [transactions, setTransactions] = useState([]);
            const [loans, setLoans] = useState([]); // חייבים לי
            const [debts, setDebts] = useState([]); // אני חייב
            const [categories, setCategories] = useState(['מזון', 'דלק', 'קניות', 'בילוי', 'בריאות']);
            
            const [isModalOpen, setIsModalOpen] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState('');
            const [partialData, setPartialData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = JSON.parse(saved);
                    setTransactions(d.transactions || []);
                    setLoans(d.loans || []);
                    setDebts(d.debts || []);
                    setCategories(d.categories || ['מזון', 'דלק', 'קניות', 'בילוי', 'בריאות']);
                    setDarkMode(d.darkMode || false);
                }
                setLoading(false);
            }, []);

            useEffect(() => {
                if (!loading) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions, loans, debts, categories, darkMode }));
                    document.body.classList.toggle('dark', darkMode);
                }
            }, [transactions, loans, debts, categories, darkMode, loading]);

            const stats = useMemo(() => {
                const now = new Date();
                const filtered = transactions.filter(t => {
                    if (dateFilter === 'all') return true;
                    const d = new Date(t.timestamp);
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                });

                const ins = filtered.filter(t => t.type === 'in').reduce((s, t) => s + t.amount, 0);
                const outs = filtered.filter(t => t.type === 'out').reduce((s, t) => s + t.amount, 0);
                
                const catTotals = {};
                filtered.filter(t => t.type === 'out').forEach(t => {
                    catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
                });

                const lSum = loans.filter(l => l.status !== 'paid').reduce((s, l) => s + (l.amount - (l.paidAmount || 0)), 0);
                const dSum = debts.filter(d => d.status !== 'paid').reduce((s, d) => s + (d.amount - (d.paidAmount || 0)), 0);

                return { balance: ins - outs, ins, outs, catTotals, lSum, dSum };
            }, [transactions, loans, debts, dateFilter]);

            const handleSaveTransaction = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const amount = Number(fd.get('amount'));
                const rate = EXCHANGE_RATES[fd.get('currency')] || 1;
                const totalAmount = amount * rate;
                
                const customCat = fd.get('custom_cat');
                const finalCategory = selectedCategory || customCat || 'כללי';
                
                if (customCat && !categories.includes(customCat)) {
                    setCategories(prev => [...prev, customCat]);
                }

                if (isModalOpen === 'loan') {
                    const isIncomingDebt = fd.get('isDebt') === 'on';
                    const loanObj = {
                        id: Date.now(),
                        name: fd.get('desc'),
                        amount: totalAmount,
                        paidAmount: 0,
                        dueDate: fd.get('due'),
                        status: 'open'
                    };
                    if (isIncomingDebt) {
                        setDebts(p => [loanObj, ...p]);
                        // הלוואה שקיבלתי = הכנסה במזומן
                        setTransactions(p => [{ id: Date.now()+1, amount: totalAmount, description: `חוב מ: ${fd.get('desc')}`, category: 'חובות', type: 'in', timestamp: new Date().toISOString() }, ...p]);
                    } else {
                        setLoans(p => [loanObj, ...p]);
                        // הלוואה שנתתי = הוצאה במזומן
                        setTransactions(p => [{ id: Date.now()+1, amount: totalAmount, description: `הלוואה ל: ${fd.get('desc')}`, category: 'הלוואות', type: 'out', timestamp: new Date().toISOString() }, ...p]);
                    }
                } else {
                    const newT = {
                        id: Date.now(),
                        amount: totalAmount,
                        description: fd.get('desc'),
                        category: finalCategory,
                        type: isModalOpen === 'income' ? 'in' : 'out',
                        timestamp: new Date().toISOString()
                    };
                    setTransactions(p => [newT, ...p]);
                }

                setIsModalOpen(null);
                setSelectedCategory('');
            };

            const handlePartial = (e) => {
                e.preventDefault();
                const amount = Number(new FormData(e.target).get('pAmount'));
                const { item, type } = partialData;

                const updateFn = (list) => list.map(i => {
                    if (i.id === item.id) {
                        const newPaid = (i.paidAmount || 0) + amount;
                        return { ...i, paidAmount: newPaid, status: newPaid >= i.amount ? 'paid' : 'open' };
                    }
                    return i;
                });

                if (type === 'loan') {
                    setLoans(updateFn);
                    setTransactions(p => [{ id: Date.now(), amount, description: `החזר הלוואה מ: ${item.name}`, category: 'הלוואות', type: 'in', timestamp: new Date().toISOString() }, ...p]);
                } else {
                    setDebts(updateFn);
                    setTransactions(p => [{ id: Date.now(), amount, description: `תשלום חוב ל: ${item.name}`, category: 'חובות', type: 'out', timestamp: new Date().toISOString() }, ...p]);
                }

                setPartialData(null);
                setIsModalOpen(null);
            };

            if (loading) return null;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-28 relative overflow-x-hidden">
                    <header className="bg-gradient-to-br from-blue-600 to-blue-800 p-8 pt-12 rounded-b-[3rem] shadow-2xl sticky top-0 z-30 text-white">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-2xl font-black italic">TITAN <span className="text-blue-200">OS</span></h1>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-3 bg-white/10 rounded-2xl backdrop-blur-md">{darkMode ? '☀️' : '🌙'}</button>
                        </div>
                        <div className="bg-white/10 backdrop-blur-xl rounded-[2rem] p-6 border border-white/20 shadow-inner">
                            <p className="text-blue-100 text-[10px] font-black uppercase mb-1 tracking-widest text-right">יתרה במזומן</p>
                            <h2 className="text-4xl font-black text-right">₪{stats.balance.toLocaleString()}</h2>
                        </div>
                    </header>

                    <div className="px-6 -mt-8 flex gap-3 overflow-x-auto no-scrollbar relative z-40 pb-6">
                        <button onClick={() => setIsModalOpen('expense')} className="flex-shrink-0 bg-red-500 text-white px-8 py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition">הוצאה</button>
                        <button onClick={() => setIsModalOpen('income')} className="flex-shrink-0 bg-green-500 text-white px-8 py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition">הכנסה</button>
                        <button onClick={() => setIsModalOpen('loan')} className="flex-shrink-0 bg-blue-500 text-white px-8 py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition">חוב / הלוואה</button>
                    </div>

                    <nav className="px-6 mb-6">
                        <div className="flex bg-gray-200 dark:bg-slate-800 p-1.5 rounded-[1.5rem]">
                            {['dashboard', 'debts', 'stats'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 text-xs font-black rounded-2xl transition-all ${activeTab === t ? 'active-tab' : 'text-gray-500'}`}>
                                    {t === 'dashboard' ? 'תנועות' : t === 'debts' ? 'חובות והלוואות' : 'סיכום'}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="px-6 space-y-4 text-right">
                        {activeTab === 'dashboard' && (
                            <>
                                <input type="text" placeholder="חיפוש..." className="w-full p-4 card outline-none text-sm font-bold dark:text-gray-900" onChange={e => setSearchQuery(e.target.value)} />
                                {transactions.filter(t => t.description.includes(searchQuery)).map(t => (
                                    <div key={t.id} className="card p-5 flex justify-between items-center animate-pop">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-1.5 h-8 rounded-full ${t.type === 'in' ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                            <div className="text-right">
                                                <p className="font-black text-sm">{t.description}</p>
                                                <p className="text-[10px] text-gray-400 font-bold">{t.category} • {new Date(t.timestamp).toLocaleDateString('he-IL')}</p>
                                            </div>
                                        </div>
                                        <p className={`font-black ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>₪{t.amount.toLocaleString()}</p>
                                    </div>
                                ))}
                            </>
                        )}

                        {activeTab === 'debts' && (
                            <div className="space-y-8">
                                {/* סעיף הלוואות שנתתי */}
                                <div>
                                    <h3 className="font-black text-green-600 mb-3 mr-2 text-lg">💰 כסף שחייבים לי</h3>
                                    <div className="space-y-4">
                                        {loans.filter(i => i.status !== 'paid').map(item => (
                                            <div key={item.id} className="card p-6 border-r-8 border-green-500 shadow-lg animate-pop">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <p className="font-black text-lg">{item.name}</p>
                                                        <p className="text-xs text-gray-400 font-bold">יעד החזר: {item.dueDate}</p>
                                                    </div>
                                                    <p className="font-black text-xl text-green-600">₪{(item.amount - (item.paidAmount || 0)).toLocaleString()}</p>
                                                </div>
                                                <button onClick={() => {setPartialData({item, type: 'loan'}); setIsModalOpen('partial');}} className="w-full py-3 bg-green-50 text-green-600 rounded-xl font-black text-xs border border-green-100">עדכון החזר שהתקבל</button>
                                            </div>
                                        ))}
                                        {loans.filter(i => i.status !== 'paid').length === 0 && <p className="text-gray-400 text-sm mr-2 italic">אין הלוואות פתוחות</p>}
                                    </div>
                                </div>

                                {/* סעיף חובות שלי */}
                                <div>
                                    <h3 className="font-black text-red-600 mb-3 mr-2 text-lg">💳 חובות שלי לאחרים</h3>
                                    <div className="space-y-4">
                                        {debts.filter(i => i.status !== 'paid').map(item => (
                                            <div key={item.id} className="card p-6 border-r-8 border-red-500 shadow-lg animate-pop">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <p className="font-black text-lg">{item.name}</p>
                                                        <p className="text-xs text-gray-400 font-bold">יעד תשלום: {item.dueDate}</p>
                                                    </div>
                                                    <p className="font-black text-xl text-red-600">₪{(item.amount - (item.paidAmount || 0)).toLocaleString()}</p>
                                                </div>
                                                <button onClick={() => {setPartialData({item, type: 'debt'}); setIsModalOpen('partial');}} className="w-full py-3 bg-red-50 text-red-600 rounded-xl font-black text-xs border border-red-100">ביצוע תשלום חוב</button>
                                            </div>
                                        ))}
                                        {debts.filter(i => i.status !== 'paid').length === 0 && <p className="text-gray-400 text-sm mr-2 italic">אין חובות פתוחים</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="card p-8">
                                <h3 className="font-black text-xl mb-6">התפלגות הוצאות</h3>
                                {Object.entries(stats.catTotals).sort((a,b) => b[1]-a[1]).map(([name, val]) => (
                                    <div key={name} className="mb-4">
                                        <div className="flex justify-between text-xs font-black mb-1"><span>{name}</span><span>₪{val.toLocaleString()}</span></div>
                                        <div className="w-full bg-gray-100 dark:bg-slate-700 h-2.5 rounded-full overflow-hidden">
                                            <div className="bg-blue-600 h-full" style={{width: `${(val/stats.outs)*100}%`}}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
                            <div className="absolute inset-0 modal-bg" onClick={() => setIsModalOpen(null)}></div>
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[3rem] p-10 shadow-2xl relative z-[110] animate-pop text-right">
                                {isModalOpen === 'partial' ? (
                                    <form onSubmit={handlePartial} className="space-y-6">
                                        <h3 className="font-black text-2xl text-center">החזר ל: {partialData.item.name}</h3>
                                        <input name="pAmount" type="number" inputMode="decimal" placeholder="סכום לתשלום" required className="w-full p-6 bg-gray-100 dark:bg-slate-800 rounded-3xl font-black text-center text-3xl dark:text-gray-100" />
                                        <button type="submit" className="w-full py-6 bg-green-600 text-white rounded-[2rem] font-black text-xl">אשר תשלום</button>
                                    </form>
                                ) : (
                                    <form onSubmit={handleSaveTransaction} className="space-y-5">
                                        <h3 className="font-black text-2xl">
                                            {isModalOpen === 'expense' ? '💸 הוצאה' : isModalOpen === 'income' ? '💰 הכנסה' : '🤝 חוב / הלוואה'}
                                        </h3>
                                        <div className="flex gap-3">
                                            <input name="amount" type="number" inputMode="decimal" placeholder="סכום" required className="flex-[2] p-5 bg-gray-100 dark:bg-slate-800 rounded-3xl font-black text-2xl dark:text-gray-100" />
                                            <select name="currency" className="flex-1 bg-gray-100 dark:bg-slate-800 rounded-3xl font-bold p-2 dark:text-gray-100">
                                                <option value="ILS">₪</option><option value="USD">$</option><option value="GEL">₾</option>
                                            </select>
                                        </div>
                                        <input name="desc" placeholder="תיאור" required className="w-full p-5 bg-gray-100 dark:bg-slate-800 rounded-3xl font-bold dark:text-gray-100" />
                                        
                                        {isModalOpen !== 'loan' && (
                                            <div className="space-y-3">
                                                <div className="flex flex-wrap gap-2">
                                                    {categories.map(c => (
                                                        <button key={c} type="button" onClick={() => setSelectedCategory(c)} className={`px-4 py-2 rounded-xl text-[10px] font-black border-2 ${selectedCategory === c ? 'bg-blue-600 border-blue-600 text-white' : 'text-gray-400'}`}>{c}</button>
                                                    ))}
                                                </div>
                                                {!selectedCategory && <input name="custom_cat" placeholder="או קטגוריה חדשה..." className="w-full p-2 border-b-2 bg-transparent text-sm font-bold" />}
                                            </div>
                                        )}

                                        {isModalOpen === 'loan' && (
                                            <div className="p-6 bg-blue-50 dark:bg-slate-800 rounded-3xl space-y-4">
                                                <label className="flex items-center gap-3 cursor-pointer">
                                                    <input name="isDebt" type="checkbox" className="w-6 h-6" />
                                                    <span className="text-sm font-black text-blue-800 dark:text-blue-300">זה חוב שלי למישהו</span>
                                                </label>
                                                <input name="due" type="date" required className="w-full p-3 bg-white dark:bg-slate-700 rounded-2xl font-bold" />
                                            </div>
                                        )}
                                        <button type="submit" className="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-xl shadow-xl mt-4">שמור</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
