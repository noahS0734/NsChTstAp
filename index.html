<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Titan Finance OS - Fixed Layout</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        .dark { background-color: #0f172a; color: white; }
        .modal-bg { background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.08); }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        .active-tab { background-color: #2563eb; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'titan_finance_v6_final';
        const EXCHANGE_RATES = { ILS: 1, USD: 3.7 };

        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchQuery, setSearchQuery] = useState('');
            const [transactions, setTransactions] = useState([]);
            const [loans, setLoans] = useState([]); 
            const [debts, setDebts] = useState([]); 
            const [isModalOpen, setIsModalOpen] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = JSON.parse(saved);
                    setTransactions(d.transactions || []);
                    setLoans(d.loans || []);
                    setDebts(d.debts || []);
                    setDarkMode(d.darkMode || false);
                }
                setLoading(false);
            }, []);

            useEffect(() => {
                if (!loading) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions, loans, debts, darkMode }));
                    document.body.classList.toggle('dark', darkMode);
                }
            }, [transactions, loans, debts, darkMode, loading]);

            const stats = useMemo(() => {
                const ins = transactions.filter(t => t.type === 'in').reduce((s, t) => s + t.amount, 0);
                const outs = transactions.filter(t => t.type === 'out').reduce((s, t) => s + t.amount, 0);
                const lSum = loans.filter(l => l.status !== 'paid').reduce((s, l) => s + (l.amount - (l.paidAmount || 0)), 0);
                const dSum = debts.filter(d => d.status !== 'paid').reduce((s, d) => s + (d.amount - (d.paidAmount || 0)), 0);
                return { balance: ins - outs, lSum, dSum };
            }, [transactions, loans, debts]);

            const handleSave = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const amount = Number(fd.get('amount'));
                if (isModalOpen === 'loan') {
                    const isDebt = fd.get('isDebt') === 'on';
                    const obj = { id: Date.now(), name: fd.get('desc'), amount, paidAmount: 0, dueDate: fd.get('due'), status: 'open' };
                    if (isDebt) setDebts(p => [obj, ...p]); else setLoans(p => [obj, ...p]);
                } else {
                    setTransactions(p => [{ id: Date.now(), amount, description: fd.get('desc'), type: isModalOpen === 'income' ? 'in' : 'out', category: 'כללי', timestamp: new Date().toISOString() }, ...p]);
                }
                setIsModalOpen(null);
            };

            if (loading) return null;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-20">
                    {/* Header - Fixed & Clean */}
                    <header className="bg-blue-600 text-white p-6 pt-10 shadow-lg">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-xl font-black italic">TITAN OS</h1>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 bg-white/10 rounded-xl text-lg">{darkMode ? '☀️' : '🌙'}</button>
                        </div>
                        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-5 border border-white/20">
                            <p className="text-blue-100 text-[10px] font-bold uppercase tracking-widest text-right mb-1">יתרה כוללת</p>
                            <h2 className="text-3xl font-black text-right">₪{stats.balance.toLocaleString()}</h2>
                        </div>
                    </header>

                    {/* Action Buttons - No overlapping */}
                    <div className="p-4 flex gap-2 overflow-x-auto no-scrollbar bg-gray-50 dark:bg-slate-900 sticky top-0 z-20 border-b dark:border-slate-800">
                        <button onClick={() => setIsModalOpen('expense')} className="flex-1 min-w-[100px] bg-red-500 text-white py-4 rounded-xl font-bold shadow-md active:scale-95 transition">הוצאה</button>
                        <button onClick={() => setIsModalOpen('income')} className="flex-1 min-w-[100px] bg-green-500 text-white py-4 rounded-xl font-bold shadow-md active:scale-95 transition">הכנסה</button>
                        <button onClick={() => setIsModalOpen('loan')} className="flex-1 min-w-[100px] bg-blue-500 text-white py-4 rounded-xl font-bold shadow-md active:scale-95 transition">חוב חדש</button>
                    </div>

                    {/* Content */}
                    <main className="p-4 space-y-4 text-right">
                        {/* Tab Switcher */}
                        <div className="flex bg-gray-200 dark:bg-slate-800 p-1 rounded-xl mb-4">
                            {['dashboard', 'debts'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-2.5 text-xs font-bold rounded-lg transition-all ${activeTab === t ? 'active-tab shadow-sm' : 'text-gray-500'}`}>
                                    {t === 'dashboard' ? 'תנועות' : 'חובות והלוואות'}
                                </button>
                            ))}
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-3">
                                {transactions.map(t => (
                                    <div key={t.id} className="card p-4 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-1 h-6 rounded-full ${t.type === 'in' ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                            <div className="text-right">
                                                <p className="font-bold text-sm">{t.description}</p>
                                                <p className="text-[10px] text-gray-400">{new Date(t.timestamp).toLocaleDateString('he-IL')}</p>
                                            </div>
                                        </div>
                                        <p className={`font-black ${t.type === 'in' ? 'text-green-600' : 'text-red-600'}`}>₪{t.amount.toLocaleString()}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'debts' && (
                            <div className="space-y-6">
                                <div>
                                    <h3 className="font-black text-green-600 text-sm mb-3 mr-1 underline decoration-2">💰 חייבים לי (₪{stats.lSum.toLocaleString()})</h3>
                                    {loans.map(l => (
                                        <div key={l.id} className="card p-5 border-r-4 border-green-500 mb-3">
                                            <div className="flex justify-between items-center">
                                                <div className="text-right">
                                                    <p className="font-bold">{l.name}</p>
                                                    <p className="text-[10px] text-gray-400 italic">יעד: {l.dueDate}</p>
                                                </div>
                                                <p className="font-black text-green-600">₪{(l.amount - (l.paidAmount || 0)).toLocaleString()}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h3 className="font-black text-red-600 text-sm mb-3 mr-1 underline decoration-2">💳 חובות שלי (₪{stats.dSum.toLocaleString()})</h3>
                                    {debts.map(d => (
                                        <div key={d.id} className="card p-5 border-r-4 border-red-500 mb-3">
                                            <div className="flex justify-between items-center">
                                                <div className="text-right">
                                                    <p className="font-bold">{d.name}</p>
                                                    <p className="text-[10px] text-gray-400 italic">יעד: {d.dueDate}</p>
                                                </div>
                                                <p className="font-black text-red-600">₪{(d.amount - (d.paidAmount || 0)).toLocaleString()}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Simple Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center p-4">
                            <div className="absolute inset-0 modal-bg" onClick={() => setIsModalOpen(null)}></div>
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-t-[2rem] p-8 shadow-2xl relative z-[110] text-right animate-in slide-in-from-bottom">
                                <form onSubmit={handleSave} className="space-y-4">
                                    <h3 className="font-black text-xl mb-4">רישום חדש</h3>
                                    <input name="amount" type="number" placeholder="סכום" required className="w-full p-4 bg-gray-100 dark:bg-slate-800 rounded-xl font-black text-xl outline-none dark:text-white" />
                                    <input name="desc" placeholder="תיאור" required className="w-full p-4 bg-gray-100 dark:bg-slate-800 rounded-xl font-bold outline-none dark:text-white" />
                                    {isModalOpen === 'loan' && (
                                        <>
                                            <label className="flex items-center gap-2 p-2"><input name="isDebt" type="checkbox" /> <span className="text-sm font-bold">חוב שלי</span></label>
                                            <input name="due" type="date" required className="w-full p-4 bg-gray-100 dark:bg-slate-800 rounded-xl font-bold" />
                                        </>
                                    )}
                                    <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-lg">שמור</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
