<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Titan Financial OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s; }
        .dark { background-color: #0f172a; color: white; }
        .modal-bg { background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.02); }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        .active-tab { background-color: #2563eb; color: white; transform: scale(1.02); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .insight-card { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const STORAGE_KEY = 'titan_financial_os_v2';
        
        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(null);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');

            // Core State
            const [transactions, setTransactions] = useState([]);
            const [subscriptions, setSubscriptions] = useState([]);
            const [investments, setInvestments] = useState([{ id: 'sp500', name: 'S&P 500 מחקה מדד', balance: 0 }]);
            
            // Salary & Predictor State
            const [hourlyRate, setHourlyRate] = useState(50);
            const [hoursWorked, setHoursWorked] = useState(0);

            // Form State
            const [tempAmount, setTempAmount] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const d = JSON.parse(saved);
                    setTransactions(d.transactions || []);
                    setSubscriptions(d.subscriptions || []);
                    setInvestments(d.investments || [{ id: 'sp500', name: 'S&P 500 מחקה מדד', balance: 0 }]);
                    setHourlyRate(d.hourlyRate || 50);
                    setHoursWorked(d.hoursWorked || 0);
                    setDarkMode(d.darkMode || false);
                }
                setLoading(false);
            }, []);

            useEffect(() => {
                if (!loading) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions, subscriptions, investments, hourlyRate, hoursWorked, darkMode }));
                    document.body.classList.toggle('dark', darkMode);
                }
            }, [transactions, subscriptions, investments, hourlyRate, hoursWorked, darkMode, loading]);

            const stats = useMemo(() => {
                const currentMonth = new Date().getMonth();
                const monthTxs = transactions.filter(t => new Date(t.timestamp).getMonth() === currentMonth);
                
                const cashIn = monthTxs.filter(t => t.type === 'in').reduce((s, t) => s + t.amount, 0);
                const cashOut = monthTxs.filter(t => t.type === 'out').reduce((s, t) => s + t.amount, 0);
                
                const catTotals = {};
                monthTxs.filter(t => t.type === 'out').forEach(t => {
                    catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
                });
                
                const subTotal = subscriptions.reduce((s, sub) => s + sub.amount, 0);
                const investmentTotal = investments.reduce((s, inv) => s + inv.balance, 0);
                const predictedSalary = hoursWorked * hourlyRate;
                const netWorth = cashIn - cashOut + investmentTotal;
                
                let insight = { title: 'הכל תקין', text: 'התזרים שלך נראה מצוין החודש.', type: 'good' };
                const futureBurdenRatio = predictedSalary > 0 ? (subTotal / predictedSalary) * 100 : 0;
                
                if (futureBurdenRatio > 40) {
                    insight = { title: 'התראת עומס עתידי ⚠️', text: `מתוך המשכורת הבאה, ${Math.round(futureBurdenRatio)}% משוריינים להוראות קבע ותשלומים!`, type: 'warning' };
                } else if (cashOut > predictedSalary && predictedSalary > 0) {
                    insight = { title: 'חריגה מתקציב השכר 📉', text: 'קצב ההוצאות הנוכחי גבוה מהשכר הצפוי שלך.', type: 'danger' };
                }

                return { cashIn, cashOut, subTotal, predictedSalary, netWorth, insight, futureBurdenRatio, catTotals };
            }, [transactions, subscriptions, investments, hoursWorked, hourlyRate]);

            const handleSaveTransaction = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const amount = Number(fd.get('amount'));
                const type = fd.get('type');
                
                const newTx = {
                    id: Date.now(),
                    amount,
                    description: fd.get('desc'),
                    category: fd.get('category') || 'כללי',
                    type: type,
                    method: fd.get('method'),
                    installments: Number(fd.get('installments')) || 1,
                    timestamp: new Date().toISOString()
                };

                if (type === 'transfer' && fd.get('investment_target')) {
                    const targetId = fd.get('investment_target');
                    setInvestments(prev => prev.map(inv => inv.id === targetId ? { ...inv, balance: inv.balance + amount } : inv));
                    newTx.description = `הפקדה ל-${investments.find(i=>i.id===targetId).name}`;
                }

                setTransactions(p => [newTx, ...p]);
                setIsModalOpen(null);
                setTempAmount('');
            };

            const handleAddSubscription = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                setSubscriptions(p => [{ id: Date.now(), name: fd.get('name'), amount: Number(fd.get('amount')), billingDay: fd.get('day') }, ...p]);
                setIsModalOpen(null);
            };

            const shareSummary = () => {
                const text = `📊 סיכום Titan Bank OS:\n💰 שווי נקי: ₪${stats.netWorth}\n📉 הוצאות החודש: ₪${stats.cashOut}\n⏳ התחייבויות קבועות: ₪${stats.subTotal}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
            };

            const deleteTx = (id) => {
                if(confirm('למחוק פעולה זו?')) setTransactions(p => p.filter(x => x.id !== id));
            };

            if (loading) return null;

            return (
                <div className="max-w-md mx-auto min-h-screen font-sans pb-12 relative">
                    {/* Header */}
                    <header className="bg-slate-900 p-6 pt-12 text-white rounded-b-[2rem] shadow-xl relative overflow-hidden z-20">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-600 rounded-full blur-3xl opacity-20 -mr-20 -mt-20"></div>
                        <div className="flex justify-between items-center mb-6 relative">
                            <h1 className="text-2xl font-black tracking-tighter">TITAN <span className="text-blue-500 font-light">FINANCIAL OS</span></h1>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-3 bg-white/5 rounded-2xl backdrop-blur-sm border border-white/10 transition-colors">
                                {darkMode ? '☀️' : '🌙'}
                            </button>
                        </div>

                        {/* Insight Card */}
                        <div className={`insight-card rounded-2xl p-5 mb-6 shadow-2xl relative border border-blue-400/30 ${stats.insight.type === 'warning' ? 'from-orange-500 to-red-500' : ''}`}>
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-2 h-2 rounded-full bg-white animate-ping"></div>
                                <h3 className="font-black text-sm tracking-wide uppercase">תובנה אוטומטית</h3>
                            </div>
                            <p className="font-bold text-lg leading-tight mb-1">{stats.insight.title}</p>
                            <p className="text-sm text-blue-100 opacity-90">{stats.insight.text}</p>
                        </div>

                        <div className="flex justify-between items-end relative">
                            <div>
                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">הוצאות שוטפות החודש</p>
                                <h2 className="text-4xl font-black">₪{stats.cashOut.toLocaleString()}</h2>
                            </div>
                            <div className="text-left">
                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">שווי נקי (Net Worth)</p>
                                <h3 className="text-xl font-bold text-emerald-400">₪{stats.netWorth.toLocaleString()}</h3>
                            </div>
                        </div>
                    </header>

                    {/* Quick Actions (Floating gently underneath) */}
                    <div className="px-6 -mt-6 relative z-30 flex gap-3">
                        <button onClick={() => setIsModalOpen('transaction')} className="flex-1 bg-blue-600 text-white py-4 rounded-[1.5rem] font-black shadow-xl shadow-blue-600/30 active:scale-95 transition-transform text-lg">+ פעולה חדשה</button>
                    </div>

                    {/* Navigation */}
                    <nav className="px-6 mt-6">
                        <div className="flex bg-slate-200 dark:bg-slate-800 p-1.5 rounded-[1.5rem]">
                            {['dashboard', 'ledger', 'future', 'wealth'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-2.5 text-[11px] font-black rounded-[1.2rem] transition-all ${activeTab === t ? 'active-tab' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>
                                    {t === 'dashboard' ? 'תזרים' : t === 'ledger' ? 'תנועות' : t === 'future' ? 'התחייבויות' : 'הון ושכר'}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="px-6 mt-6">
                        
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-slide-up">
                                <div className="card p-6 border-r-4 border-emerald-500">
                                    <p className="text-xs font-bold text-slate-400 mb-1">שכר צפוי (לפי {hoursWorked} שעות)</p>
                                    <p className="text-2xl font-black text-emerald-600">₪{stats.predictedSalary.toLocaleString()}</p>
                                    <div className="mt-4 bg-slate-100 dark:bg-slate-800 rounded-full h-2 overflow-hidden">
                                        <div className="bg-emerald-500 h-full" style={{width: `${Math.min((stats.cashOut / stats.predictedSalary) * 100, 100)}%`}}></div>
                                    </div>
                                    <p className="text-[10px] text-slate-400 mt-2 font-bold">נוצלו {Math.round((stats.cashOut / stats.predictedSalary) * 100 || 0)}% מהשכר הצפוי</p>
                                </div>

                                <div>
                                    <h3 className="font-black text-lg mb-4 text-slate-800 dark:text-white">פעולות אחרונות</h3>
                                    <div className="space-y-3">
                                        {transactions.slice(0, 5).map(t => (
                                            <div key={t.id} className="card p-4 flex justify-between items-center bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl shrink-0 ${t.type === 'out' ? 'bg-rose-100 text-rose-600' : t.type === 'in' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'}`}>
                                                        {t.type === 'out' ? '-' : t.type === 'in' ? '+' : '⇄'}
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-sm text-slate-800 dark:text-white leading-tight">{t.description}</p>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">{t.method} • {new Date(t.timestamp).toLocaleDateString('he-IL')}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <p className={`font-black ${t.type === 'out' ? 'text-rose-600' : t.type === 'in' ? 'text-emerald-600' : 'text-blue-600'}`}>
                                                        ₪{t.amount.toLocaleString()}
                                                    </p>
                                                    <button onClick={() => deleteTx(t.id)} className="text-slate-200 hover:text-rose-500 transition-colors">✕</button>
                                                </div>
                                            </div>
                                        ))}
                                        {transactions.length === 0 && <p className="text-center text-slate-400 font-bold text-sm">אין פעולות להצגה.</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ledger' && (
                            <div className="space-y-6 animate-slide-up">
                                <div className="card p-6 shadow-sm">
                                    <h3 className="font-black text-lg mb-4 text-slate-800 dark:text-white">התפלגות הוצאות (החודש)</h3>
                                    <div className="space-y-4">
                                        {Object.entries(stats.catTotals).sort((a,b)=>b[1]-a[1]).map(([n, v]) => (
                                            <div key={n}>
                                                <div className="flex justify-between text-xs font-bold mb-1 px-1">
                                                    <span className="text-slate-700 dark:text-slate-300">{n}</span>
                                                    <span className="text-slate-500 dark:text-slate-400">₪{v.toLocaleString()}</span>
                                                </div>
                                                <div className="w-full bg-slate-100 dark:bg-slate-700 h-2.5 rounded-full overflow-hidden">
                                                    <div className="bg-blue-500 h-full" style={{width: `${(v/stats.cashOut)*100}%`}}></div>
                                                </div>
                                            </div>
                                        ))}
                                        {Object.keys(stats.catTotals).length === 0 && <p className="text-center text-slate-400 text-xs">אין הוצאות החודש.</p>}
                                    </div>
                                </div>

                                <div>
                                    <input type="text" placeholder="חיפוש בתנועות..." className="w-full p-4 card outline-none text-sm font-bold bg-white dark:bg-slate-800 dark:text-white mb-4" onChange={e => setSearchQuery(e.target.value)} />
                                    <div className="space-y-3">
                                        {transactions.filter(t => t.description.includes(searchQuery)).map(t => (
                                            <div key={t.id} className="card p-5 flex justify-between items-center">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-1.5 h-10 rounded-full ${t.type === 'out' ? 'bg-rose-500' : t.type === 'in' ? 'bg-emerald-500' : 'bg-blue-500'}`}></div>
                                                    <div>
                                                        <p className="font-black text-sm text-slate-800 dark:text-white">{t.description}</p>
                                                        <p className="text-[10px] text-slate-400 font-bold flex gap-2 mt-1">
                                                            <span className="uppercase">{t.method}</span>
                                                            <span className="bg-slate-100 dark:bg-slate-700 px-1.5 rounded">{t.category}</span>
                                                            {t.installments > 1 && <span className="text-amber-600 bg-amber-100 dark:bg-amber-900/30 px-1.5 rounded">תשלומים: {t.installments}</span>}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <p className={`font-black text-lg ${t.type === 'out' ? 'text-rose-600' : t.type === 'in' ? 'text-emerald-600' : 'text-blue-600'}`}>₪{t.amount.toLocaleString()}</p>
                                                    <button onClick={() => deleteTx(t.id)} className="text-slate-200 hover:text-rose-500 transition-colors">✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'future' && (
                            <div className="space-y-6 animate-slide-up">
                                <div className="card p-6 bg-slate-900 text-white">
                                    <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">סך התחייבויות קבועות</p>
                                    <h3 className="text-3xl font-black text-rose-400">₪{stats.subTotal.toLocaleString()}<span className="text-sm text-slate-500 font-normal"> / חודש</span></h3>
                                </div>

                                <div>
                                    <h3 className="font-black text-lg text-slate-800 dark:text-white mb-3">עסקאות בתשלומים</h3>
                                    <div className="space-y-3">
                                        {transactions.filter(t => t.installments > 1).map(t => (
                                            <div key={t.id} className="card p-4 flex justify-between items-center border-r-4 border-amber-400">
                                                <div>
                                                    <p className="font-bold text-slate-800 dark:text-white">{t.description}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold mt-1">פריסה ל-{t.installments} תשלומים • סה"כ: ₪{t.amount}</p>
                                                </div>
                                                <div className="text-left">
                                                    <p className="font-black text-amber-600">₪{Math.round(t.amount / t.installments)}</p>
                                                    <p className="text-[9px] text-slate-400 font-bold uppercase">לחודש</p>
                                                </div>
                                            </div>
                                        ))}
                                        {transactions.filter(t => t.installments > 1).length === 0 && <p className="text-slate-400 text-sm">אין עסקאות פתוחות בתשלומים.</p>}
                                    </div>
                                </div>

                                <div>
                                    <div className="flex justify-between items-center mb-4 mt-6">
                                        <h3 className="font-black text-lg text-slate-800 dark:text-white">מנויים והוראות קבע</h3>
                                        <button onClick={() => setIsModalOpen('subscription')} className="text-xs font-black text-blue-600 bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-lg">+ מנוי חדש</button>
                                    </div>
                                    <div className="space-y-3">
                                        {subscriptions.map(s => (
                                            <div key={s.id} className="card p-5 flex justify-between items-center border-r-4 border-indigo-500">
                                                <div>
                                                    <p className="font-black text-slate-800 dark:text-white">{s.name}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold">חיוב ב-{s.billingDay} לחודש</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <p className="font-black text-rose-600">₪{s.amount}</p>
                                                    <button onClick={() => setSubscriptions(p=>p.filter(x=>x.id!==s.id))} className="text-slate-200 hover:text-rose-500">✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'wealth' && (
                            <div className="space-y-6 animate-slide-up pb-10">
                                <div className="card p-6 shadow-md border-r-4 border-emerald-500">
                                    <h3 className="font-black text-lg mb-4 text-slate-800 dark:text-white flex items-center gap-2">
                                        <span>⏱️</span> הגדרות שכר אוטומטי
                                    </h3>
                                    <div className="grid grid-cols-2 gap-4 mb-2">
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">שכר שעתי (₪)</p>
                                            <input type="number" value={hourlyRate} onChange={(e) => setHourlyRate(Number(e.target.value))} className="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-black outline-none text-slate-800 dark:text-white border border-transparent focus:border-emerald-500 transition-colors" />
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">שעות שבוצעו</p>
                                            <input type="number" value={hoursWorked} onChange={(e) => setHoursWorked(Number(e.target.value))} className="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-black outline-none text-slate-800 dark:text-white border border-transparent focus:border-emerald-500 transition-colors" />
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <h3 className="font-black text-lg mb-4 text-slate-800 dark:text-white flex items-center gap-2">
                                        <span>📈</span> תיק השקעות
                                    </h3>
                                    <div className="space-y-3">
                                        {investments.map(inv => (
                                            <div key={inv.id} className="card p-6 bg-gradient-to-br from-slate-800 to-slate-900 text-white relative overflow-hidden">
                                                <div className="absolute right-0 top-0 bottom-0 w-2 bg-emerald-500"></div>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">נכס פיננסי</p>
                                                <h4 className="font-black text-xl mb-4">{inv.name}</h4>
                                                <p className="text-3xl font-black text-emerald-400">₪{inv.balance.toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="pt-6 space-y-3 border-t border-slate-200 dark:border-slate-800">
                                    <button onClick={shareSummary} className="w-full py-4 bg-emerald-500 text-white rounded-2xl font-black text-sm shadow-lg active:scale-95 transition uppercase tracking-wider">שיתוף סיכום בוואטסאפ 💬</button>
                                    <button onClick={() => {
                                        const blob = new Blob([localStorage.getItem(STORAGE_KEY)], {type:'application/json'});
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a'); a.href = url; a.download = 'titan_bank_backup.json'; a.click();
                                    }} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[11px] shadow-lg active:scale-95 transition uppercase tracking-wider">גיבוי נתונים מקומי לקובץ 💾</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {isModalOpen === 'transaction' && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
                            <div className="absolute inset-0 modal-bg" onClick={() => {setIsModalOpen(null); setTempAmount('');}}></div>
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl relative z-[110] animate-slide-up border-t-8 border-blue-600 max-h-[90vh] overflow-y-auto">
                                <form onSubmit={handleSaveTransaction} className="space-y-5">
                                    <h3 className="font-black text-2xl text-slate-800 dark:text-white">רישום פעולה</h3>
                                    
                                    <div className="relative">
                                        <input name="amount" type="number" inputMode="decimal" required placeholder="סכום (₪)" value={tempAmount} onChange={(e) => setTempAmount(e.target.value)} className="w-full p-5 bg-slate-100 dark:bg-slate-800 rounded-2xl font-black text-3xl outline-none text-slate-800 dark:text-white focus:ring-4 ring-blue-500/20 transition-all" />
                                        {tempAmount > 0 && (
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-left">
                                                <p className="text-[10px] font-bold text-slate-400 uppercase">שווה ערך ל:</p>
                                                <p className="text-sm font-black text-rose-500">{(tempAmount / hourlyRate).toFixed(1)} שעות עבודה</p>
                                            </div>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <select name="type" className="p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-sm outline-none text-slate-800 dark:text-white">
                                            <option value="out">הוצאה</option>
                                            <option value="in">הכנסה</option>
                                            <option value="transfer">העברה לחיסכון</option>
                                        </select>
                                        <select name="method" className="p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold text-sm outline-none text-slate-800 dark:text-white">
                                            <option value="Credit Card">כרטיס אשראי</option>
                                            <option value="Bank Transfer">העברה בנקאית</option>
                                            <option value="Bit / Paybox">אפליקציות (Bit)</option>
                                        </select>
                                    </div>

                                    <input name="desc" placeholder="תיאור העסקה / חנות" required className="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none text-slate-800 dark:text-white" />
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">תשלומים</p>
                                            <input name="installments" type="number" placeholder="1" min="1" max="36" className="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none text-slate-800 dark:text-white" />
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">קטגוריה / יעד</p>
                                            <input name="category" placeholder="אוכל, רכב..." className="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold text-xs outline-none text-slate-800 dark:text-white" />
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all mt-4">שמור ועדכן תזרים</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {isModalOpen === 'subscription' && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
                            <div className="absolute inset-0 modal-bg" onClick={() => setIsModalOpen(null)}></div>
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl relative z-[110] animate-slide-up border-t-8 border-indigo-500">
                                <form onSubmit={handleAddSubscription} className="space-y-5">
                                    <h3 className="font-black text-2xl text-slate-800 dark:text-white">הוראת קבע חדשה</h3>
                                    <input name="name" placeholder="למי משלמים? (למשל: חשמל, נטפליקס)" required className="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none text-slate-800 dark:text-white" />
                                    <div className="flex gap-3">
                                        <input name="amount" type="number" placeholder="סכום קבוע" required className="flex-[2] p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-black text-xl outline-none text-slate-800 dark:text-white" />
                                        <input name="day" type="number" min="1" max="31" placeholder="יום חיוב" required className="flex-1 p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold outline-none text-center text-slate-800 dark:text-white" />
                                    </div>
                                    <button type="submit" className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all mt-4">הוסף למנויים</button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
